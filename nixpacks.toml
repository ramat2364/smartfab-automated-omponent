# Root Nixpacks Configuration for Railway Deployment
providers = ["node"]

[variables]
PRISMA_HIDE_UPDATE_MESSAGE = "true"

[phases.setup]
nixPkgs = ["nodejs_20", "openssl", "ca-certificates"]

[phases.install]
cmds = ["npm install --prefix backend", "npm install --prefix frontend"]

[phases.build]
cmds = [
  "cd backend && npx prisma generate && npm run build",
  "cd frontend && npm run build"
]

[start]
cmd = "cd backend && npx prisma migrate deploy && npm run seed && npm start"
