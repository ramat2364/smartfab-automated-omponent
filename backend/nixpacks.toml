# Nixpacks Configuration for Railway Deployment
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20", "openssl", "openssl_1_1", "ca-certificates"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "mkdir -p /lib /usr/lib /usr/lib/x86_64-linux-gnu 2>/dev/null || true",
  "npx prisma generate",
  "npm run build"
]

[start]
cmd = "npx prisma migrate deploy && npm run seed && npm start"
