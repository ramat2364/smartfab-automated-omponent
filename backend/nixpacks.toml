# Nixpacks Configuration for Railway Deployment
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20", "openssl", "ca-certificates"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "npx --no-install prisma generate",
  "npm run build"
]

[start]
cmd = "npx --no-install prisma migrate deploy && npm run seed && npm start"
