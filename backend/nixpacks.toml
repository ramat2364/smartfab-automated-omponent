# Nixpacks Configuration for Railway Deployment
providers = ["node"]

[variables]
PRISMA_HIDE_UPDATE_MESSAGE = "true"

[phases.setup]
nixPkgs = ["nodejs_20", "openssl", "ca-certificates"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build"
]

[start]
cmd = "(npx prisma migrate deploy || true) && npm start"
